spring.application.name=admin
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.data.mongodb.uri=${MONGODB_URI}

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URI}/realms/coomiix
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URI}/realms/coomiix/protocol/openid-connect/certs
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_URI}/realms/coomiix
