apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  namespace: coomiix
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: mongodb-storage
  local:
    path: /data/mongodb
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - minikube
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: coomiix
spec:
  storageClassName: mongodb-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
